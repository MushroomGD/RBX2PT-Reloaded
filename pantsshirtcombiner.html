<!DOCTYPE html>
<html lang="en">
<head>
  <title>PT Shirt + Pants Combiner</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink: #bf4197;
      --blue: #257fdb;
      --green: #27a96b;
      --bg: #141414;
      --surface: #1e1e1e;
      --surface2: #282828;
      --border: #333;
      --text: #f0f0f0;
      --muted: #888;
      --radius: 14px;
    }

    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Hero ── */
    .hero {
      position: relative;
      overflow: hidden;
      padding: 52px 24px 80px;
      text-align: center;
      background: linear-gradient(135deg, #0d1f14 0%, #0d1a2e 50%, #1a0d14 100%);
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 50% 70% at 15% 50%, rgba(39,169,107,0.15) 0%, transparent 70%),
        radial-gradient(ellipse 40% 60% at 50% 40%, rgba(37,127,219,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 50% 70% at 85% 50%, rgba(191,65,151,0.15) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-eyebrow {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--green);
      margin-bottom: 12px;
    }
    .hero h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(1.8rem, 5vw, 3.2rem);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.02em;
      background: linear-gradient(100deg, #27a96b 0%, #257fdb 50%, #bf4197 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 14px;
    }
    .hero-sub { font-size: 0.85rem; color: var(--muted); }
    .hero-sub a { color: #f59dcc; text-decoration: none; }
    .hero-sub a:hover { text-decoration: underline; }

    /* ── Main ── */
    .main {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 20px 60px;
    }

    /* ── Upload pair ── */
    .upload-pair {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 32px;
      margin-bottom: 20px;
    }
    @media (max-width: 520px) {
      .upload-pair { grid-template-columns: 1fr; }
    }

    .upload-slot {
      border: 1.5px dashed var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 32px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      text-align: center;
      position: relative;
      min-height: 160px;
      justify-content: center;
    }
    .upload-slot:hover, .upload-slot.drag-over {
      background: rgba(37,127,219,0.06);
      box-shadow: 0 0 0 4px rgba(37,127,219,0.08);
    }
    .upload-slot.has-file {
      border-color: var(--green);
      background: rgba(39,169,107,0.06);
    }
    .upload-slot.drag-over { border-color: var(--blue); }

    .slot-icon { width: 32px; height: 32px; opacity: 0.6; }
    .slot-icon.shirt { color: var(--blue); }
    .slot-icon.pants { color: var(--pink); }
    .upload-slot.has-file .slot-icon { opacity: 1; }

    .slot-label {
      font-family: 'Syne', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .slot-label.shirt { color: var(--blue); }
    .slot-label.pants { color: var(--pink); }

    .slot-hint { font-size: 0.75rem; color: var(--muted); }

    .slot-filename {
      font-size: 0.7rem;
      color: var(--green);
      font-family: monospace;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      display: none;
    }
    .upload-slot.has-file .slot-filename { display: block; }
    .upload-slot.has-file .slot-hint { display: none; }

    .slot-clear {
      position: absolute;
      top: 8px;
      right: 10px;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1rem;
      cursor: pointer;
      line-height: 1;
      display: none;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
    }
    .slot-clear:hover { color: var(--text); background: var(--surface2); }
    .upload-slot.has-file .slot-clear { display: block; }

    /* ── Combine button ── */
    .combine-row {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }
    .btn-combine {
      font-family: 'Syne', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 12px 36px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      background: linear-gradient(90deg, var(--green), var(--blue));
      color: #fff;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: opacity 0.15s, transform 0.15s;
    }
    .btn-combine:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      transform: none !important;
    }
    .btn-combine:not(:disabled):hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-combine:not(:disabled):active { transform: translateY(0); }
    .btn-combine svg { width: 16px; height: 16px; }

    /* ── Invalid notice ── */
    .invalid-notice {
      text-align: center;
      font-size: 0.8rem;
      color: #e05252;
      margin-bottom: 16px;
      min-height: 1.2em;
      display: none;
    }
    .invalid-notice.visible { display: block; }

    /* ── Preview card ── */
    .preview-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      display: none;
    }
    .preview-card.visible { display: block; }

    .preview-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
    }
    .preview-title {
      font-family: 'Syne', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--muted);
      text-transform: uppercase;
    }
    .preview-badge {
      font-size: 0.7rem;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 999px;
      background: rgba(39,169,107,0.15);
      color: var(--green);
      border: 1px solid rgba(39,169,107,0.3);
    }

    .canvas-wrap {
      background-color: #444;
      background-image:
        linear-gradient(45deg, #555 25%, transparent 25%),
        linear-gradient(-45deg, #555 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #555 75%),
        linear-gradient(-45deg, transparent 75%, #555 75%);
      background-size: 16px 16px;
      background-position: 0 0, 0 8px, 8px -8px, -8px 0px;
      padding: 16px;
      display: flex;
      justify-content: center;
    }
    #outputCanvas {
      max-width: 100%;
      height: auto;
      display: block;
      border-radius: 6px;
    }

    .preview-footer {
      padding: 14px 18px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .preview-filename {
      font-size: 0.75rem;
      color: var(--muted);
      font-family: monospace;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .btn-download {
      font-family: 'Syne', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 10px 22px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      background: linear-gradient(90deg, var(--green), var(--blue));
      color: #fff;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: opacity 0.15s, transform 0.15s;
      flex-shrink: 0;
    }
    .btn-download:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-download:active { transform: translateY(0); opacity: 1; }
    .btn-download svg { width: 14px; height: 14px; }

    input[type=file] { display: none; }
  </style>
</head>
<body>

  <div class="hero">
    <p class="hero-eyebrow">Polytoria Clothing</p>
    <h1>Shirt + Pants Combiner</h1>
    <p class="hero-sub">
      Also see: <a href="index.html">RBX2PT — Roblox to Polytoria</a>
    </p>
  </div>

  <div class="main">

    <div class="upload-pair">

      <!-- Shirt slot -->
      <div class="upload-slot" id="slotShirt">
        <button class="slot-clear" id="clearShirt" title="Remove">✕</button>
        <svg class="slot-icon shirt" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20.38 3.46L16 2a4 4 0 01-8 0L3.62 3.46a2 2 0 00-1.34 2.23l.58 3.57a1 1 0 00.99.86H6v10c0 1.1.9 2 2 2h8a2 2 0 002-2V10h2.15a1 1 0 00.99-.86l.58-3.57a2 2 0 00-1.34-2.23z"/>
        </svg>
        <span class="slot-label shirt">Shirt</span>
        <span class="slot-hint">Drop PT shirt texture here</span>
        <span class="slot-filename" id="shirtFilename">—</span>
      </div>

      <!-- Pants slot -->
      <div class="upload-slot" id="slotPants">
        <button class="slot-clear" id="clearPants" title="Remove">✕</button>
        <svg class="slot-icon pants" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 2h12l1 8H5L6 2z"/>
          <path d="M5 10l-1 12h5l2-6 2 6h5L17 10"/>
        </svg>
        <span class="slot-label pants">Pants</span>
        <span class="slot-hint">Drop PT pants texture here</span>
        <span class="slot-filename" id="pantsFilename">—</span>
      </div>

    </div>

    <p class="invalid-notice" id="invalidNotice">Both a shirt and pants file are required to combine.</p>

    <div class="combine-row">
      <button class="btn-combine" id="btnCombine" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 5v14M5 12h14"/>
        </svg>
        Combine
      </button>
    </div>

    <div class="preview-card" id="previewCard">
      <div class="preview-header">
        <span class="preview-title">Combined Output</span>
        <span class="preview-badge">SHIRT + PANTS</span>
      </div>
      <div class="canvas-wrap">
        <canvas id="outputCanvas" width="1024" height="1024"></canvas>
      </div>
      <div class="preview-footer">
        <span class="preview-filename" id="filenameDisplay">—</span>
        <button class="btn-download" id="btnDownload">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 4v12m0 0l-4-4m4 4l4-4"/>
            <path d="M4 18h16"/>
          </svg>
          Download
        </button>
      </div>
    </div>

  </div>

  <input type="file" accept="image/*" id="inputShirt">
  <input type="file" accept="image/*" id="inputPants">

  <script>
    // ── Canvases ──────────────────────────────────────────────────────────
    const shirtCanvas = document.createElement('canvas');
    shirtCanvas.width = 1024; shirtCanvas.height = 1024;
    const shirtCtx = shirtCanvas.getContext('2d', { willReadFrequently: true });

    const pantsCanvas = document.createElement('canvas');
    pantsCanvas.width = 1024; pantsCanvas.height = 1024;
    const pantsCtx = pantsCanvas.getContext('2d', { willReadFrequently: true });

    const outputCanvas = document.getElementById('outputCanvas');
    const outputCtx = outputCanvas.getContext('2d');

    // ── State ─────────────────────────────────────────────────────────────
    let shirtLoaded = false;
    let pantsLoaded = false;
    let pendingFilename = '';
    const recentSuffixes = new Set();

    // ── DOM ───────────────────────────────────────────────────────────────
    const slotShirt      = document.getElementById('slotShirt');
    const slotPants      = document.getElementById('slotPants');
    const inputShirt     = document.getElementById('inputShirt');
    const inputPants     = document.getElementById('inputPants');
    const clearShirt     = document.getElementById('clearShirt');
    const clearPants     = document.getElementById('clearPants');
    const shirtFilename  = document.getElementById('shirtFilename');
    const pantsFilename  = document.getElementById('pantsFilename');
    const btnCombine     = document.getElementById('btnCombine');
    const invalidNotice  = document.getElementById('invalidNotice');
    const previewCard    = document.getElementById('previewCard');
    const btnDownload    = document.getElementById('btnDownload');
    const filenameDisplay = document.getElementById('filenameDisplay');

    // ── Filename generation ───────────────────────────────────────────────
    function generateFilename() {
      const now = new Date();
      const dd = String(now.getDate()).padStart(2, '0');
      const mm = String(now.getMonth() + 1).padStart(2, '0');
      const yy = String(now.getFullYear()).slice(-2);
      let suffix, attempts = 0;
      do {
        suffix = String(Math.floor(100000 + Math.random() * 900000));
        attempts++;
      } while (recentSuffixes.has(suffix) && attempts < 100);
      recentSuffixes.add(suffix);
      if (recentSuffixes.size > 40) recentSuffixes.delete(recentSuffixes.values().next().value);
      return `Combined_${dd}${mm}${yy}${suffix}.png`;
    }

    // ── Slot setup ────────────────────────────────────────────────────────
    function setupSlot(slot, input, isShirt) {
      slot.addEventListener('click', (e) => {
        if (e.target === clearShirt || e.target === clearPants) return;
        input.click();
      });
      slot.addEventListener('dragover', (e) => {
        e.preventDefault();
        slot.classList.add('drag-over');
      });
      slot.addEventListener('dragleave', () => slot.classList.remove('drag-over'));
      slot.addEventListener('drop', (e) => {
        e.preventDefault();
        slot.classList.remove('drag-over');
        const file = e.dataTransfer.files[0];
        if (file) loadFile(file, isShirt);
      });
      input.addEventListener('change', (e) => {
        if (e.target.files[0]) loadFile(e.target.files[0], isShirt);
        input.value = '';
      });
    }

    setupSlot(slotShirt, inputShirt, true);
    setupSlot(slotPants, inputPants, false);

    // ── Clear buttons ─────────────────────────────────────────────────────
    clearShirt.addEventListener('click', (e) => {
      e.stopPropagation();
      shirtLoaded = false;
      shirtCtx.clearRect(0, 0, 1024, 1024);
      slotShirt.classList.remove('has-file');
      shirtFilename.textContent = '—';
      updateState();
    });
    clearPants.addEventListener('click', (e) => {
      e.stopPropagation();
      pantsLoaded = false;
      pantsCtx.clearRect(0, 0, 1024, 1024);
      slotPants.classList.remove('has-file');
      pantsFilename.textContent = '—';
      updateState();
    });

    // ── Load file into canvas ─────────────────────────────────────────────
    function loadFile(file, isShirt) {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          const ctx = isShirt ? shirtCtx : pantsCtx;
          ctx.clearRect(0, 0, 1024, 1024);
          ctx.drawImage(img, 0, 0, 1024, 1024);

          if (isShirt) {
            shirtLoaded = true;
            slotShirt.classList.add('has-file');
            shirtFilename.textContent = file.name;
          } else {
            pantsLoaded = true;
            slotPants.classList.add('has-file');
            pantsFilename.textContent = file.name;
          }
          updateState();
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    // ── Update button/notice state ────────────────────────────────────────
    function updateState() {
      const both = shirtLoaded && pantsLoaded;
      const either = shirtLoaded || pantsLoaded;

      btnCombine.disabled = !both;

      // Show invalid notice only if user has loaded exactly one file
      // (i.e. they've started but haven't completed)
      if (either && !both) {
        invalidNotice.classList.add('visible');
      } else {
        invalidNotice.classList.remove('visible');
      }

      // Hide preview if files changed after a combine
      if (!either) {
        previewCard.classList.remove('visible');
        outputCtx.clearRect(0, 0, 1024, 1024);
      }
    }

    // ── Combine ───────────────────────────────────────────────────────────
    btnCombine.addEventListener('click', () => {
      if (!shirtLoaded || !pantsLoaded) return;

      outputCtx.clearRect(0, 0, 1024, 1024);

      // Draw pants first (base layer), then shirt on top
      // Shirt regions take priority — they cover torso + arms
      // Pants regions cover legs + torso bottom
      outputCtx.drawImage(pantsCanvas, 0, 0);
      outputCtx.drawImage(shirtCanvas, 0, 0);

      pendingFilename = generateFilename();
      filenameDisplay.textContent = pendingFilename;
      previewCard.classList.add('visible');
    });

    // ── Download ──────────────────────────────────────────────────────────
    btnDownload.addEventListener('click', () => {
      const link = document.createElement('a');
      link.href = outputCanvas.toDataURL('image/png');
      link.download = pendingFilename;
      link.click();

      // Reset after download
      setTimeout(() => {
        outputCtx.clearRect(0, 0, 1024, 1024);
        shirtCtx.clearRect(0, 0, 1024, 1024);
        pantsCtx.clearRect(0, 0, 1024, 1024);

        shirtLoaded = false;
        pantsLoaded = false;
        slotShirt.classList.remove('has-file');
        slotPants.classList.remove('has-file');
        shirtFilename.textContent = '—';
        pantsFilename.textContent = '—';
        previewCard.classList.remove('visible');
        filenameDisplay.textContent = '—';
        pendingFilename = '';
        invalidNotice.classList.remove('visible');
        btnCombine.disabled = true;
      }, 300);
    });
  </script>
    <script>
(function() {
    const style = document.createElement('style');
    style.textContent = `
        body { 
            opacity: 0; 
            transition: opacity 0.5s ease-in-out; 
        }
        body.fade-in { 
            opacity: 1; 
        }
        body.fade-out { 
            opacity: 0; 
        }
    `;
    document.head.appendChild(style);

    window.addEventListener('DOMContentLoaded', () => {
        document.body.classList.add('fade-in');

        document.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', (e) => {
                const isInternal = link.hostname === window.location.hostname;
                const isNotBlank = link.target !== '_blank';
                
                if (isInternal && isNotBlank && link.href.includes('#') === false) {
                    e.preventDefault();
                    const target = link.href;
                    
                    document.body.classList.add('fade-out');
                    
                    setTimeout(() => {
                        window.location.href = target;
                    }, 500); // Matches the 0.5s transition
                }
            });
        });
    });

    window.addEventListener('pageshow', (event) => {
        if (event.persisted) {
            document.body.classList.remove('fade-out');
            document.body.classList.add('fade-in');
        }
    });
})();
</body>
</html>
