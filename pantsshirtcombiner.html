<!DOCTYPE html>
<html lang="en">
<head>
  <title>PT Shirt + Pants Combiner</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --pink: #bf4197; --blue: #257fdb; --green: #27a96b; --bg: #141414;
      --surface: #1e1e1e; --border: #333; --text: #f0f0f0; --muted: #888; --radius: 14px;
    }
    body { background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--text); min-height: 100vh; overflow-x: hidden; }

    #page-wrapper { min-height: 100vh; width: 100%; opacity: 1; transition: opacity 0.4s ease-in-out; }
    #page-wrapper.fade-out { opacity: 0; }

    .hero {
      position: relative; overflow: hidden; padding: 52px 24px 80px; text-align: center;
      background: linear-gradient(135deg, #0d1f14 0%, #0d1a2e 50%, #1a0d14 100%);
    }
    .hero::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse 50% 70% at 15% 50%, rgba(39,169,107,0.15) 0%, transparent 70%),
                  radial-gradient(ellipse 40% 60% at 50% 40%, rgba(37,127,219,0.12) 0%, transparent 70%),
                  radial-gradient(ellipse 50% 70% at 85% 50%, rgba(191,65,151,0.15) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero h1 {
      font-family: 'Syne', sans-serif; font-size: clamp(1.8rem, 5vw, 3.2rem); font-weight: 800;
      background: linear-gradient(100deg, #27a96b 0%, #257fdb 50%, #bf4197 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 14px;
    }
    .hero-sub a { color: #f59dcc; text-decoration: none; }

    .main { max-width: 720px; margin: 0 auto; padding: 0 20px 60px; }
    .upload-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 32px; margin-bottom: 20px; }
    @media (max-width: 520px) { .upload-pair { grid-template-columns: 1fr; } }

    .upload-slot {
      border: 1.5px dashed var(--border); border-radius: var(--radius); background: var(--surface);
      padding: 32px 16px; display: flex; flex-direction: column; align-items: center; gap: 8px;
      cursor: pointer; transition: all 0.2s; text-align: center; position: relative; min-height: 160px; justify-content: center;
    }
    .upload-slot.drag-over { border-color: var(--blue); background: rgba(37,127,219,0.1); }
    .upload-slot.has-file { border-color: var(--green); border-style: solid; background: rgba(39,169,107,0.06); }
    
    .slot-icon { width: 32px; height: 32px; opacity: 0.6; }
    .slot-label { font-family: 'Syne', sans-serif; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; }
    .slot-label.shirt { color: var(--blue); }
    .slot-label.pants { color: var(--pink); }
    .slot-filename { font-size: 0.7rem; color: var(--green); font-family: monospace; word-break: break-all; margin-top: 5px; }

    .btn-combine {
      font-family: 'Syne', sans-serif; font-size: 0.85rem; font-weight: 700; padding: 12px 36px;
      border-radius: 999px; border: none; cursor: pointer; color: #fff;
      background: linear-gradient(90deg, var(--green), var(--blue));
      display: flex; align-items: center; gap: 10px; margin: 0 auto; transition: transform 0.1s;
    }
    .btn-combine:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
    .btn-combine:active:not(:disabled) { transform: scale(0.98); }

    .preview-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; display: none; margin-top: 20px; }
    .preview-card.visible { display: block; animation: slideUp 0.3s ease-out; }
    .canvas-wrap { background: #111; padding: 16px; display: flex; justify-content: center; }
    #outputCanvas { max-width: 100%; height: auto; border-radius: 6px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    
    .preview-footer { padding: 14px 18px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .btn-download { font-family: 'Syne', sans-serif; font-size: 0.8rem; font-weight: 700; padding: 10px 22px; border-radius: 999px; border: none; cursor: pointer; color: #fff; background: var(--green); }

    @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<div id="page-wrapper">
  <div class="hero">
    <p class="hero-eyebrow">Polytoria Clothing</p>
    <h1>Shirt + Pants Combiner</h1>
    <p class="hero-sub">Also see: <a href="index.html">RBX2PT — Roblox to Polytoria</a></p>
  </div>

  <div class="main">
    <div class="upload-pair">
      <div class="upload-slot" id="slotShirt">
        <svg class="slot-icon" viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="1.5"><path d="M20.38 3.46L16 2a4 4 0 01-8 0L3.62 3.46a2 2 0 00-1.34 2.23l.58 3.57a1 1 0 00.99.86H6v10c0 1.1.9 2 2 2h8a2 2 0 002-2V10h2.15a1 1 0 00.99-.86l.58-3.57a2 2 0 00-1.34-2.23z"/></svg>
        <span class="slot-label shirt">Shirt</span>
        <span class="slot-hint" id="shirtHint">Click or Drop Shirt</span>
        <span class="slot-filename" id="shirtFilename"></span>
      </div>

      <div class="upload-slot" id="slotPants">
        <svg class="slot-icon" viewBox="0 0 24 24" fill="none" stroke="var(--pink)" stroke-width="1.5"><path d="M6 2h12l1 8H5L6 2zM5 10l-1 12h5l2-6 2 6h5L17 10"/></svg>
        <span class="slot-label pants">Pants</span>
        <span class="slot-hint" id="pantsHint">Click or Drop Pants</span>
        <span class="slot-filename" id="pantsFilename"></span>
      </div>
    </div>

    <button class="btn-combine" id="btnCombine" disabled>Combine Textures</button>

    <div class="preview-card" id="previewCard">
      <div class="canvas-wrap"><canvas id="outputCanvas" width="1024" height="1024"></canvas></div>
      <div class="preview-footer">
        <span id="filenameDisplay" style="font-size: 0.75rem; color: var(--muted); font-family: monospace;"></span>
        <button class="btn-download" id="btnDownload">Download PNG</button>
      </div>
    </div>
  </div>
</div>

<input type="file" id="inputShirt" accept="image/*">
<input type="file" id="inputPants" accept="image/*">

<script>
    const shirtCanvas = document.createElement('canvas'); shirtCanvas.width = 1024; shirtCanvas.height = 1024;
    const shirtCtx = shirtCanvas.getContext('2d');
    const pantsCanvas = document.createElement('canvas'); pantsCanvas.width = 1024; pantsCanvas.height = 1024;
    const pantsCtx = pantsCanvas.getContext('2d');
    const outputCanvas = document.getElementById('outputCanvas');
    const outputCtx = outputCanvas.getContext('2d');

    let shirtLoaded = false, pantsLoaded = false;

    function handleFile(file, isShirt) {
        if (!file || !file.type.startsWith('image/')) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const ctx = isShirt ? shirtCtx : pantsCtx;
                ctx.clearRect(0, 0, 1024, 1024);
                ctx.drawImage(img, 0, 0, 1024, 1024);
                if (isShirt) { 
                    shirtLoaded = true; 
                    document.getElementById('slotShirt').classList.add('has-file');
                    document.getElementById('shirtFilename').textContent = file.name;
                    document.getElementById('shirtHint').style.display = 'none';
                } else { 
                    pantsLoaded = true; 
                    document.getElementById('slotPants').classList.add('has-file');
                    document.getElementById('pantsFilename').textContent = file.name;
                    document.getElementById('pantsHint').style.display = 'none';
                }
                document.getElementById('btnCombine').disabled = !(shirtLoaded && pantsLoaded);
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    // Drag & Drop Listeners
    [ {s: 'slotShirt', i: 'inputShirt', t: true}, {s: 'slotPants', i: 'inputPants', t: false} ].forEach(obj => {
        const slot = document.getElementById(obj.s);
        const input = document.getElementById(obj.i);
        slot.addEventListener('click', () => input.click());
        input.addEventListener('change', (e) => handleFile(e.target.files[0], obj.t));
        slot.addEventListener('dragover', (e) => { e.preventDefault(); slot.classList.add('drag-over'); });
        slot.addEventListener('dragleave', () => slot.classList.remove('drag-over'));
        slot.addEventListener('drop', (e) => {
            e.preventDefault();
            slot.classList.remove('drag-over');
            handleFile(e.dataTransfer.files[0], obj.t);
        });
    });

    document.getElementById('btnCombine').addEventListener('click', () => {
        outputCtx.clearRect(0, 0, 1024, 1024);
        outputCtx.drawImage(pantsCanvas, 0, 0);
        outputCtx.drawImage(shirtCanvas, 0, 0);
        document.getElementById('previewCard').classList.add('visible');
        document.getElementById('filenameDisplay').textContent = `combined_${Date.now()}.png`;
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    });

    document.getElementById('btnDownload').addEventListener('click', () => {
        const a = document.createElement('a');
        a.href = outputCanvas.toDataURL('image/png');
        a.download = document.getElementById('filenameDisplay').textContent;
        a.click();
    });

    // Simple fade transition for navigation
    document.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', function(e) {
            if (this.hostname === window.location.hostname && !this.target && !this.href.includes('#')) {
                e.preventDefault();
                const url = this.href;
                document.getElementById('page-wrapper').classList.add('fade-out');
                setTimeout(() => window.location.href = url, 400);
            }
        });
    });
</script>
</body>
</html>
