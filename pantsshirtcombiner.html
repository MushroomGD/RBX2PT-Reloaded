<!DOCTYPE html>
<html lang="en">
<head>
  <title>PT Shirt + Pants Combiner</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink: #bf4197; --blue: #257fdb; --green: #27a96b;
      --bg: #141414; --surface: #1e1e1e; --border: #333;
      --text: #f0f0f0; --muted: #888; --radius: 14px;
    }

    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      min-height: 100vh;
      margin: 0;
    }

    #page-wrapper {
        min-height: 100vh;
        width: 100%;
        opacity: 1;
        transition: opacity 0.4s ease-in-out;
        display: flex;
        flex-direction: column;
    }
    #page-wrapper.fade-out { opacity: 0; }

    .hero {
      position: relative;
      padding: 60px 24px;
      text-align: center;
      background: linear-gradient(135deg, #0d1f14 0%, #0d1a2e 50%, #1a0d14 100%);
    }

    .hero h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2rem, 8vw, 3.5rem);
      font-weight: 800;
      background: linear-gradient(100deg, var(--green), var(--blue), var(--pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    .main { 
      max-width: 800px; 
      width: 100%;
      margin: 0 auto; 
      padding: 40px 20px; 
    }

    .upload-pair { 
      display: flex; 
      gap: 20px; 
      margin-bottom: 30px;
    }

    @media (max-width: 600px) {
      .upload-pair { flex-direction: column; }
    }

    .upload-slot {
      flex: 1;
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      min-height: 200px;
    }

    .upload-slot:hover { border-color: var(--blue); background: #252525; }
    .upload-slot.has-file { border-color: var(--green); border-style: solid; background: rgba(39,169,107,0.05); }

    .slot-icon { width: 40px; height: 40px; stroke-width: 1.5; pointer-events: none; }
    .slot-label { font-family: 'Syne', sans-serif; font-weight: 700; text-transform: uppercase; font-size: 0.9rem; }
    
    .btn-combine {
      display: block;
      width: fit-content;
      margin: 0 auto 40px;
      padding: 14px 40px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      border-radius: 50px;
      border: none;
      color: white;
      background: linear-gradient(90deg, var(--green), var(--blue));
      cursor: pointer;
      transition: transform 0.2s, opacity 0.2s;
    }

    .btn-combine:disabled { opacity: 0.2; cursor: not-allowed; }
    .btn-combine:hover:not(:disabled) { transform: scale(1.05); }

    .preview-card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
      display: none;
    }

    .preview-card.visible { display: block; animation: fadeIn 0.5s ease; }
    .canvas-container { background: #111; padding: 20px; display: flex; justify-content: center; }
    canvas { max-width: 100%; height: auto; border-radius: 8px; }

    .preview-footer { 
        padding: 20px; 
        display: flex; 
        justify-content: space-between; 
        align-items: center; 
        border-top: 1px solid var(--border);
    }

    .btn-download {
      background: var(--green);
      color: white;
      border: none;
      padding: 10px 25px;
      border-radius: 50px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      cursor: pointer;
    }

    input[type="file"] { display: none; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<div id="page-wrapper">
  <div class="hero">
    <h1>Shirt + Pants Combiner</h1>
    <p style="color: var(--muted)">Select both textures to merge them into one PT file.</p>
    <p style="margin-top: 10px; font-size: 0.8rem;"><a href="index.html" style="color: #f59dcc; text-decoration: none;">← Back to RBX2PT</a></p>
  </div>

  <div class="main">
    <div class="upload-pair">
      <div class="upload-slot" id="slotShirt">
        <svg class="slot-icon" viewBox="0 0 24 24" fill="none" stroke="var(--blue)"><path d="M20.38 3.46L16 2a4 4 0 01-8 0L3.62 3.46a2 2 0 00-1.34 2.23l.58 3.57a1 1 0 00.99.86H6v10c0 1.1.9 2 2 2h8a2 2 0 002-2V10h2.15a1 1 0 00.99-.86l.58-3.57a2 2 0 00-1.34-2.23z" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span class="slot-label" style="color: var(--blue)">Shirt Texture</span>
        <span id="shirtStatus" style="font-size: 0.75rem; color: var(--muted);">Click to upload</span>
      </div>

      <div class="upload-slot" id="slotPants">
        <svg class="slot-icon" viewBox="0 0 24 24" fill="none" stroke="var(--pink)"><path d="M6 2h12l1 8H5L6 2zM5 10l-1 12h5l2-6 2 6h5L17 10" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span class="slot-label" style="color: var(--pink)">Pants Texture</span>
        <span id="pantsStatus" style="font-size: 0.75rem; color: var(--muted);">Click to upload</span>
      </div>
    </div>

    <button class="btn-combine" id="btnCombine" disabled>Combine Textures</button>

    <div class="preview-card" id="previewCard">
      <div class="canvas-container">
        <canvas id="outputCanvas" width="1024" height="1024"></canvas>
      </div>
      <div class="preview-footer">
        <span id="finalFilename" style="font-family: monospace; font-size: 0.8rem;"></span>
        <button class="btn-download" id="btnDownload">Download PNG</button>
      </div>
    </div>
  </div>
</div>

<input type="file" id="inputShirt" accept="image/*">
<input type="file" id="inputPants" accept="image/*">

<script>
  const shirtCanvas = document.createElement('canvas'); shirtCanvas.width = 1024; shirtCanvas.height = 1024;
  const pantsCanvas = document.createElement('canvas'); pantsCanvas.width = 1024; pantsCanvas.height = 1024;
  
  let shirtReady = false, pantsReady = false;

  function setupInput(slotId, inputId, canvas, statusId, type) {
    const slot = document.getElementById(slotId);
    const input = document.getElementById(inputId);
    const ctx = canvas.getContext('2d');

    slot.onclick = () => input.click();

    input.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (event) => {
        const img = new Image();
        img.onload = () => {
          ctx.clearRect(0,0,1024,1024);
          ctx.drawImage(img, 0, 0, 1024, 1024);
          slot.classList.add('has-file');
          document.getElementById(statusId).textContent = file.name;
          if(type === 'shirt') shirtReady = true; else pantsReady = true;
          document.getElementById('btnCombine').disabled = !(shirtReady && pantsReady);
        };
        img.src = event.target.result;
      };
      reader.readAsDataURL(file);
    };
  }

  setupInput('slotShirt', 'inputShirt', shirtCanvas, 'shirtStatus', 'shirt');
  setupInput('slotPants', 'inputPants', pantsCanvas, 'pantsStatus', 'pants');

  document.getElementById('btnCombine').onclick = () => {
    const out = document.getElementById('outputCanvas');
    const outCtx = out.getContext('2d');
    outCtx.clearRect(0,0,1024,1024);
    outCtx.drawImage(pantsCanvas, 0, 0);
    outCtx.drawImage(shirtCanvas, 0, 0);
    document.getElementById('previewCard').classList.add('visible');
    document.getElementById('finalFilename').textContent = `combined_${Date.now()}.png`;
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
  };

  document.getElementById('btnDownload').onclick = () => {
    const link = document.createElement('a');
    link.download = document.getElementById('finalFilename').textContent;
    link.href = document.getElementById('outputCanvas').toDataURL();
    link.click();
  };

  // Improved SPA Navigation
  (function() {
    function initLinks() {
      document.querySelectorAll('a').forEach(a => {
        a.onclick = async (e) => {
          if (a.hostname === window.location.hostname && !a.hash) {
            e.preventDefault();
            const wrap = document.getElementById('page-wrapper');
            wrap.classList.add('fade-out');
            try {
              const res = await fetch(a.href);
              const text = await res.text();
              const nextDoc = new DOMParser().parseFromString(text, 'text/html');
              const nextWrap = nextDoc.getElementById('page-wrapper');
              setTimeout(() => {
                if (nextWrap) {
                  wrap.innerHTML = nextWrap.innerHTML;
                  document.title = nextDoc.title;
                  window.history.pushState({}, '', a.href);
                  initLinks(); // Re-init for new links
                  wrap.classList.remove('fade-out');
                } else { window.location.href = a.href; }
              }, 400);
            } catch { window.location.href = a.href; }
          }
        };
      });
    }
    initLinks();
  })();
</script>
</body>
</html>
