<!DOCTYPE html>
<html lang="en">
<head>
  <title>RBX2PT-Reloaded</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --pink: #bf4197; --blue: #257fdb; --bg: #141414; --surface: #1e1e1e;
      --border: #333; --text: #f0f0f0; --muted: #888; --radius: 14px;
    }
    body { background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--text); min-height: 100vh; overflow-x: hidden; }
    
    #page-wrapper { min-height: 100vh; width: 100%; opacity: 1; transition: opacity 0.4s ease-in-out; }
    #page-wrapper.fade-out { opacity: 0; }

    .hero {
      position: relative; overflow: hidden; padding: 52px 24px 80px; text-align: center;
      background: linear-gradient(135deg, #1a0d14 0%, #0d1a2e 100%);
    }
    .hero::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse 60% 80% at 20% 50%, rgba(191,65,151,0.18) 0%, transparent 70%),
                  radial-gradient(ellipse 50% 70% at 80% 40%, rgba(37,127,219,0.15) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-eyebrow { font-size: 0.7rem; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--pink); margin-bottom: 12px; }
    .hero h1 {
      font-family: 'Syne', sans-serif; font-size: clamp(1.8rem, 5vw, 3.2rem); font-weight: 800; line-height: 1.1;
      background: linear-gradient(100deg, #fff 30%, #bf4197 70%, #257fdb 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 14px;
    }
    .hero-sub { font-size: 0.85rem; color: var(--muted); }
    .hero-sub a { color: #7ab8f5; text-decoration: none; }
    .main { max-width: 720px; margin: 0 auto; padding: 0 20px 60px; }
    .mode-row { display: flex; align-items: center; justify-content: center; gap: 16px; margin-top: -28px; margin-bottom: 28px; position: relative; z-index: 10; }
    .mode-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 999px; display: flex; padding: 5px; box-shadow: 0 4px 24px rgba(0,0,0,0.4); }
    .mode-btn { font-family: 'Syne', sans-serif; font-size: 0.75rem; font-weight: 700; padding: 8px 22px; border-radius: 999px; border: none; cursor: pointer; background: transparent; color: var(--muted); }
    .mode-btn.active { background: linear-gradient(90deg, var(--pink), var(--blue)); color: #fff; }
    .upload-zone { border: 1.5px dashed var(--border); border-radius: var(--radius); background: var(--surface); padding: 48px 24px; display: flex; flex-direction: column; align-items: center; gap: 10px; cursor: pointer; text-align: center; }
    .upload-zone:hover { border-color: var(--pink); background: rgba(191,65,151,0.06); }
    .upload-icon { width: 40px; height: 40px; color: var(--pink); }
    .preview-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; display: none; margin-top: 20px; }
    .preview-card.visible { display: block; }
    .preview-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid var(--border); }
    .canvas-wrap { background-color: #444; padding: 16px; display: flex; justify-content: center; }
    #previewCanvas { max-width: 100%; height: auto; border-radius: 6px; }
    .preview-footer { padding: 14px 18px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .btn-download { font-family: 'Syne', sans-serif; font-size: 0.8rem; font-weight: 700; padding: 10px 22px; border-radius: 999px; border: none; cursor: pointer; background: linear-gradient(90deg, var(--pink), var(--blue)); color: #fff; display: flex; align-items: center; gap: 8px; }
    #imageInput { display: none; }
  </style>
</head>
<body>

<div id="page-wrapper">
  <div class="hero">
    <p class="hero-eyebrow">Clothing Converter</p>
    <h1>Roblox → Polytoria</h1>
    <p class="hero-sub">Also see: <a href="pt2rbx.html">PT2RBX</a> · <a href="pantsshirtcombiner.html">Combiner</a></p>
  </div>

  <div class="main">
    <div class="mode-row">
      <div class="mode-pill">
        <button class="mode-btn active" id="btn-shirt">SHIRT</button>
        <button class="mode-btn" id="btn-pants">PANTS</button>
      </div>
    </div>

    <div class="upload-zone" id="uploadZone">
      <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 16V4m0 0L8 8m4-4l4 4M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1"/></svg>
      <span class="upload-label">Drop your Roblox template here</span>
    </div>

    <div class="preview-card" id="previewCard">
      <div class="preview-header"><span class="preview-title">Output Preview</span><span id="modeBadge" style="color:var(--pink);font-size:0.7rem;font-weight:700;">SHIRT</span></div>
      <div class="canvas-wrap"><canvas id="previewCanvas" width="1024" height="1024"></canvas></div>
      <div class="preview-footer"><span id="filenameDisplay" style="font-size:0.75rem;color:var(--muted);font-family:monospace;">—</span><button class="btn-download" id="btnDownload">Download</button></div>
    </div>
  </div>
</div>

<input type="file" id="imageInput" accept="image/*">

<script>
  const srcCanv = document.createElement('canvas'); srcCanv.width = 585; srcCanv.height = 559;
  const srcCtx = srcCanv.getContext('2d');
  const outShirt = document.createElement('canvas'); outShirt.width = 1024; outShirt.height = 1024;
  const outPants = document.createElement('canvas'); outPants.width = 1024; outPants.height = 1024;
  const prevCanv = document.getElementById('previewCanvas');
  const prevCtx = prevCanv.getContext('2d');

  let mode = 'shirt', hasImg = false;
  const fNames = { shirt: '', pants: '' };

  const setMode = (m) => {
    mode = m;
    document.getElementById('btn-shirt').classList.toggle('active', m === 'shirt');
    document.getElementById('btn-pants').classList.toggle('active', m === 'pants');
    if(hasImg) updateDisplay();
  };

  document.getElementById('btn-shirt').onclick = () => setMode('shirt');
  document.getElementById('btn-pants').onclick = () => setMode('pants');

  function updateDisplay() {
    prevCtx.clearRect(0,0,1024,1024);
    prevCtx.drawImage(mode === 'shirt' ? outShirt : outPants, 0, 0);
    document.getElementById('modeBadge').textContent = mode.toUpperCase();
    document.getElementById('filenameDisplay').textContent = fNames[mode];
  }

  document.getElementById('uploadZone').onclick = () => document.getElementById('imageInput').click();
  document.getElementById('imageInput').onchange = (e) => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (r) => {
      const img = new Image();
      img.onload = () => {
        srcCtx.clearRect(0,0,585,559);
        srcCtx.drawImage(img,0,0);
        render();
      };
      img.src = r.target.result;
    };
    reader.readAsDataURL(file);
  };

  function blit(ctx, sx, sy, sw, sh, dx, dy, dw, dh) {
    ctx.drawImage(srcCanv, sx, sy, sw, sh, dx, dy, dw, dh);
  }

  function render() {
    [outShirt.getContext('2d'), outPants.getContext('2d')].forEach(ctx => {
      ctx.clearRect(0,0,1024,1024);
      blit(ctx, 231, 74, 128, 128, 440, 103, 144, 290);
      blit(ctx, 165, 74, 64, 128, 351, 103, 87, 290);
      blit(ctx, 361, 74, 64, 128, 586, 103, 87, 290);
      blit(ctx, 427, 74, 128, 128, 439, 519, 146, 290);
    });
    
    const pCtx = outPants.getContext('2d');
    blit(pCtx, 217, 355, 64, 128, 206, 661, 64, 292);
    blit(pCtx, 308, 355, 64, 128, 754, 661, 64, 292);

    const sCtx = outShirt.getContext('2d');
    blit(sCtx, 217, 355, 64, 128, 204, 71, 66, 290);
    blit(sCtx, 308, 355, 64, 128, 754, 71, 66, 290);

    fNames.shirt = 'Shirt_' + Date.now() + '.png';
    fNames.pants = 'Pants_' + Date.now() + '.png';
    hasImg = true;
    document.getElementById('previewCard').classList.add('visible');
    updateDisplay();
  }

  document.getElementById('btnDownload').onclick = () => {
    const a = document.createElement('a');
    a.href = (mode === 'shirt' ? outShirt : outPants).toDataURL();
    a.download = fNames[mode];
    a.click();
  };

  (function() {
    function attach() {
      document.querySelectorAll('a').forEach(l => {
        l.onclick = async (e) => {
          if (l.hostname === window.location.hostname && !l.hash) {
            e.preventDefault();
            const w = document.getElementById('page-wrapper');
            w.classList.add('fade-out');
            try {
              const r = await fetch(l.href);
              const h = await r.text();
              const d = new DOMParser().parseFromString(h, 'text/html');
              setTimeout(() => {
                w.innerHTML = d.querySelector('#page-wrapper').innerHTML;
                document.title = d.title;
                window.history.pushState({}, '', l.href);
                attach();
                w.classList.remove('fade-out');
              }, 400);
            } catch { window.location.href = l.href; }
          }
        };
      });
    }
    attach();
  })();

</script>
</body>
</html>
